<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login-e-cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <title>Login</title>
</head>

<body>
    <h1>LOGIN</h1>
    <form>
        <label for="email">Enter your e-mail:</label><br>
        <input type="email" id="login-email" required><br>
        <label for="password">Type the password:</label><br>
        <input type="password" id="login-password" required><br>
        <button type="submit">Login</button>
        <a href="cadastro.html">Don't have an account? Register</a>
    </form>

    <script src="js/main.js"></script>
</body>

</html>
