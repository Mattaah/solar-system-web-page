<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="login-e-cadastro.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>

<body>
    <h1>REGISTER</h1>
    <form id="form-register">
        <label for="email">Enter the user e-mail:</label><br>
        <input type="email" id="register-email" required><br>
        <label for="password">Create new password:</label><br>
        <input type="password" id="register-password" required><br>
        <button type="submit">Register</button>
        <a href="login.html">Already have an account? Login</a>
    </form>

    <script src="js/script.js"></script>
</body>

</html>
